<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Éditeur Carte CO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --co-orange: #E85D04;
    --co-dark: #1a1a2e;
    --co-panel: #16213e;
    --co-accent: #0f3460;
    --co-light: #f0f0ec;
    --co-muted: #8a8a99;
    --co-green: #2ec4b6;
    --co-red: #e63946;
    --radius: 8px;
    --panel-w: 260px;
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--co-dark);
    color: var(--co-light);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    background: var(--co-panel);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
    z-index: 100;
  }
  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--co-orange);
  }
  .logo span { color: var(--co-light); }
  .header-sep { flex: 1; }

  /* Mode buttons */
  .mode-group {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: var(--radius);
    padding: 3px;
  }
  .mode-btn {
    border: none;
    background: none;
    color: var(--co-muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .mode-btn.active {
    background: var(--co-orange);
    color: #fff;
  }
  .mode-btn:hover:not(.active) { background: rgba(255,255,255,0.08); color: var(--co-light); }

  /* Action buttons */
  .action-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: var(--co-light);
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .action-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); }
  .action-btn.danger { border-color: rgba(232,62,70,.4); color: var(--co-red); }
  .action-btn.danger:hover { background: rgba(232,62,70,.12); }
  .action-btn.primary { background: var(--co-orange); border-color: var(--co-orange); color: #fff; }
  .action-btn.primary:hover { background: #d14e00; }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDE PANEL ── */
  .panel {
    width: var(--panel-w);
    background: var(--co-panel);
    border-right: 1px solid rgba(255,255,255,0.07);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .panel-section {
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .panel-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--co-muted);
    margin-bottom: 10px;
  }

  /* Balise courante */
  .current-badge {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .badge-triangle {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }
  .badge-info { flex: 1; }
  .badge-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--co-orange);
    font-family: 'DM Mono', monospace;
    line-height: 1;
  }
  .badge-sub { font-size: 11px; color: var(--co-muted); margin-top: 2px; }

  /* Free mode input */
  .free-input-wrap {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .free-input-wrap.visible { display: flex; }
  .free-input-wrap label { font-size: 11px; color: var(--co-muted); white-space: nowrap; }
  .free-input-wrap input {
    width: 60px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    color: var(--co-light);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    padding: 4px 8px;
    text-align: center;
  }
  .free-input-wrap input:focus { outline: none; border-color: var(--co-orange); }

  /* Balises list */
  .balises-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .balises-list::-webkit-scrollbar { width: 4px; }
  .balises-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .balise-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 12px;
    transition: background .1s;
    cursor: pointer;
  }
  .balise-item:hover { background: rgba(255,255,255,0.05); }
  .balise-item.placed { color: var(--co-light); }
  .balise-item.unplaced { color: var(--co-muted); }
  .balise-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .balise-dot.placed { background: var(--co-green); }
  .balise-dot.unplaced { background: rgba(255,255,255,0.15); }
  .balise-num {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    min-width: 22px;
  }
  .balise-del {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--co-red);
    cursor: pointer;
    font-size: 14px;
    opacity: 0;
    padding: 0 2px;
    line-height: 1;
    transition: opacity .15s;
  }
  .balise-item:hover .balise-del { opacity: 1; }

  /* Progress bar */
  .progress-wrap { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.06); }
  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .progress-fill {
    height: 100%;
    background: var(--co-green);
    border-radius: 2px;
    transition: width .3s ease;
  }
  .progress-text { font-size: 11px; color: var(--co-muted); font-family: 'DM Mono', monospace; }

  /* ── MAP AREA ── */
  .map-area {
    flex: 1;
    overflow: auto;
    position: relative;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(15,52,96,0.3) 0%, transparent 60%),
      var(--co-dark);
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
  }

  .map-container {
    position: relative;
    display: inline-block;
    margin: 20px;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    cursor: crosshair;
  }
  .map-container.mode-seq { cursor: crosshair; }
  .map-container.mode-free { cursor: cell; }
  .map-container.mode-del { cursor: not-allowed; }

  #map-img {
    display: block;
    max-width: none;
    height: auto;
    pointer-events: none;
  }

  /* SVG overlay — height:auto pour que le SVG calcule sa hauteur depuis son
     viewBox (même ratio que l'image). Évite toute dérive verticale au zoom. */
  #map-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: auto;
    pointer-events: none;
  }

  /* Triangle balise SVG */
  .balise-marker {
    pointer-events: all;
    cursor: grab;
  }
  .balise-marker:active { cursor: grabbing; }
  .balise-marker.mode-del { cursor: not-allowed; }

  .marker-tri {
    fill: white;
    stroke: #E85D04;
    stroke-width: 2.5;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
  }
  .marker-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    fill: #E85D04;
    dominant-baseline: hanging;
  }

  /* Zoom controls */
  .zoom-controls {
    position: absolute;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 50;
  }
  .zoom-btn {
    width: 32px; height: 32px;
    background: var(--co-panel);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: var(--co-light);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .zoom-btn:hover { background: rgba(255,255,255,0.1); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--co-panel);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    color: var(--co-light);
    transition: transform .25s ease;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Upload overlay */
  .upload-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
  }
  .upload-box {
    border: 2px dashed rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 48px 64px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .upload-box:hover { border-color: var(--co-orange); background: rgba(232,93,4,0.06); }
  .upload-icon { font-size: 48px; margin-bottom: 12px; }
  .upload-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .upload-sub { font-size: 13px; color: var(--co-muted); }
  #file-input { display: none; }

  /* ── Réglages parcours / fausses balises ── */
  .field-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .field-row label { font-size: 11px; color: var(--co-muted); white-space: nowrap; flex: 1; }
  .field-row input[type="number"], .field-row select {
    width: 70px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    color: var(--co-light);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 4px 6px;
    text-align: center;
  }
  .field-row select { width: auto; text-align: left; }
  .field-row input:focus, .field-row select:focus { outline: none; border-color: var(--co-orange); }

  .switch-row {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    margin-bottom: 8px;
  }
  .switch-row input { width: 16px; height: 16px; accent-color: var(--co-orange); cursor: pointer; }
  .switch-row span { font-size: 12px; color: var(--co-light); }

  .mini-btn {
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: var(--co-light);
    font-family: 'Sora', sans-serif;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .15s;
  }
  .mini-btn:hover { background: rgba(255,255,255,0.12); }

  /* Bascule vue Prof / Élève */
  .view-toggle { display: flex; gap: 4px; background: rgba(255,255,255,0.05); border-radius: var(--radius); padding: 3px; }
  .view-toggle button {
    flex: 1;
    border: none; background: none;
    color: var(--co-muted);
    font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 5px 8px; border-radius: 6px; cursor: pointer; transition: all .15s;
  }
  .view-toggle button.active { background: var(--co-green); color: #06231f; font-weight: 600; }

  /* Toggle côté étiquette dans la liste */
  .balise-side {
    background: none; border: 1px solid rgba(255,255,255,0.15);
    color: var(--co-muted);
    cursor: pointer; font-size: 11px; line-height: 1;
    border-radius: 5px; padding: 2px 5px;
    font-family: 'DM Mono', monospace;
    margin-left: auto;
  }
  .balise-side:hover { color: var(--co-orange); border-color: var(--co-orange); }
  .balise-del { margin-left: 6px; }

  /* Étiquette élève dans la liste */
  .balise-label-input {
    width: 42px;
    background: rgba(46,196,182,0.1);
    border: 1px solid rgba(46,196,182,0.35);
    border-radius: 5px;
    color: var(--co-green);
    font-family: 'DM Mono', monospace;
    font-size: 12px; font-weight: 600;
    padding: 2px 4px; text-align: center;
  }
  .balise-label-input:focus { outline: none; border-color: var(--co-green); }

  /* Tableau de correspondance (écran) */
  .corr-table { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 12px; }
  .corr-table th, .corr-table td { padding: 4px 6px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .corr-table th { color: var(--co-muted); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .corr-table td:first-child { color: var(--co-orange); }
  .corr-table td:last-child { color: var(--co-green); }

  /* Bloc impression tableau de correspondance (caché à l'écran) */
  #print-corr { display: none; }

  /* Print styles */
  @media print {
    @page { margin: 8mm; size: auto; }
    html, body { height: auto !important; overflow: visible !important; background: white; }
    header, .panel, .zoom-controls, .toast { display: none !important; }
    .main { display: block; height: auto !important; overflow: visible !important; }
    .map-area { overflow: visible !important; background: white; height: auto !important; display: block !important; }
    .map-container { margin: 0 !important; box-shadow: none !important; display: block !important; width: 100% !important; height: auto !important; }
    #map-img { width: 100% !important; height: auto !important; }
    #map-svg { position: absolute; top: 0; left: 0; width: 100% !important; height: auto !important; }

    /* Tableau de correspondance à l'impression (mode prof uniquement) */
    body[data-print="prof"] #print-corr { display: block !important; page-break-before: always; color: #000; padding: 10px; }
    #print-corr h2 { font-family: 'Sora', sans-serif; font-size: 18px; margin-bottom: 10px; }
    #print-corr table { border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 14px; }
    #print-corr th, #print-corr td { border: 1px solid #000; padding: 6px 16px; text-align: center; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">CO<span>éditeur</span></div>

  <div class="mode-group">
    <button class="mode-btn active" id="btn-seq" onclick="setMode('seq')">⟶ Séquentiel</button>
    <button class="mode-btn" id="btn-free" onclick="setMode('free')"># Libre</button>
    <button class="mode-btn" id="btn-depart" onclick="setMode('depart')">▲ Départ</button>
    <button class="mode-btn" id="btn-move" onclick="setMode('move')">✥ Déplacer</button>
    <button class="mode-btn" id="btn-del" onclick="setMode('del')">✕ Supprimer</button>
  </div>

  <div class="header-sep"></div>

  <button class="action-btn danger" onclick="clearAll()">⟳ Tout effacer</button>
  <button class="action-btn" onclick="saveData()">↓ Sauvegarder</button>
  <button class="action-btn" onclick="loadFile()">↑ Charger</button>
  <button class="action-btn primary" onclick="printAs('prof')">⎙ Prof</button>
  <button class="action-btn primary" id="btn-print-eleve" onclick="printAs('eleve')" style="display:none">⎙ Élève</button>
  <input type="file" id="load-input" accept=".json" style="display:none" onchange="loadData(this)">
</header>

<div class="main">
  <!-- Panel -->
  <div class="panel">
    <div class="panel-section">
      <div class="panel-label">Parcours</div>
      <div class="field-row">
        <label>Nombre de balises</label>
        <input type="number" id="total-balises" min="1" max="99" value="24" onchange="setTotal(this.value)">
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Balise active</div>
      <div class="current-badge">
        <svg class="badge-triangle" viewBox="0 0 36 36">
          <polygon points="18,4 34,32 2,32" fill="white" stroke="#E85D04" stroke-width="3"/>
        </svg>
        <div class="badge-info">
          <div class="badge-num" id="current-num-display">1</div>
          <div class="badge-sub" id="current-sub">Cliquez sur la carte</div>
        </div>
      </div>
      <div class="free-input-wrap" id="free-wrap">
        <label>Numéro :</label>
        <input type="number" id="free-num" min="1" max="99" value="1">
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Balises placées</div>
    </div>
    <div class="balises-list" id="balises-list"></div>

    <div class="panel-section">
      <div class="panel-label">Plan fausses balises</div>
      <label class="switch-row">
        <input type="checkbox" id="decoy-toggle" onchange="setDecoy(this.checked)">
        <span>Activer les fausses balises</span>
      </label>
      <div id="decoy-controls" style="display:none">
        <div class="field-row">
          <label>Étiquettes</label>
          <select id="decoy-type" onchange="setDecoyType(this.value)">
            <option value="letters">Lettres (A, B, C…)</option>
            <option value="numbers">Chiffres mélangés</option>
          </select>
        </div>
        <div class="field-row">
          <button class="mini-btn" onclick="regenerateLabels()">↻ Régénérer</button>
        </div>
        <div class="panel-label" style="margin-top:6px">Affichage carte</div>
        <div class="view-toggle">
          <button id="view-prof" class="active" onclick="setView('prof')">Prof</button>
          <button id="view-eleve" onclick="setView('eleve')">Élève</button>
        </div>
        <div class="panel-label" style="margin-top:12px">Correspondance</div>
        <div id="corr-wrap" style="max-height:160px; overflow-y:auto;"></div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-text" id="progress-text">0 / 24 balises</div>
    </div>
  </div>

  <!-- Map area -->
  <div class="map-area" id="map-area">
    <div class="upload-overlay" id="upload-overlay" style="display:none">
      <div class="upload-box" onclick="document.getElementById('file-input').click()">
        <div class="upload-icon">🗺️</div>
        <div class="upload-title">Importer votre carte</div>
        <div class="upload-sub">Cliquez ou glissez votre image ici<br>JPG, PNG, WEBP acceptés</div>
      </div>
      <input type="file" id="file-input" accept="image/*" onchange="loadImage(this)">

<!-- Tableau de correspondance imprimé (mode prof, plan fausses balises) -->
<div id="print-corr"></div>

<script>
// ── STATE ──
let mode = 'seq';         // 'seq' | 'free' | 'depart' | 'move' | 'del'
let nextSeq = 1;
let balises = [];         // { num, x, y, side:'right'|'left', label:'' }  x,y en % de l'image
let depart = null;        // { x, y } en %
let scale = 1;
let imgNaturalW = 0, imgNaturalH = 0;
let dragging = null;

let totalBalises = 24;    // nombre de balises du parcours (configurable)
let decoyEnabled = false; // plan fausses balises actif
let decoyType = 'letters';// 'letters' | 'numbers'
let viewMode = 'prof';    // 'prof' | 'eleve' — quelles étiquettes afficher sur la carte
let savedViewMode = 'prof';

// ── INIT drag-drop image ──
const mapArea = document.getElementById('map-area');
mapArea.addEventListener('dragover', e => { e.preventDefault(); });
mapArea.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) applyImage(f);
});

function loadImage(input) {
  const f = input.files[0];
  if (f) applyImage(f);
}

function applyImage(file) {
  const url = URL.createObjectURL(file);
  const img = document.getElementById('map-img');
  img.onload = () => {
    imgNaturalW = img.naturalWidth;
    imgNaturalH = img.naturalHeight;
    scale = Math.min(1, (window.innerWidth - 260 - 40) / imgNaturalW);
    applyScale();
  };
  img.src = url;
  document.getElementById('upload-overlay').style.display = 'none';
  document.getElementById('map-container').style.display = 'inline-block';
}

// ── MODE ──
function setMode(m) {
  mode = m;
  ['seq','free','depart','move','del'].forEach(id => {
    document.getElementById('btn-'+id).classList.toggle('active', id === m);
  });
  const mc = document.getElementById('map-container');
  mc.className = 'map-container mode-' + m;
  document.getElementById('free-wrap').classList.toggle('visible', m === 'free');
  updateCurrentDisplay();
  renderSVG();
}

function updateCurrentDisplay() {
  const d = document.getElementById('current-num-display');
  const s = document.getElementById('current-sub');
  if (mode === 'seq') {
    if (nextSeq > totalBalises) { d.textContent = '✓'; s.textContent = totalBalises + ' balises placées !'; }
    else { d.textContent = nextSeq; s.textContent = 'Cliquez sur la carte'; }
  } else if (mode === 'free') {
    d.textContent = document.getElementById('free-num').value;
    s.textContent = 'Mode libre';
  } else if (mode === 'depart') {
    d.textContent = '▲'; s.textContent = 'Placer le départ';
  } else if (mode === 'move') {
    d.textContent = '✥'; s.textContent = 'Glissez une balise';
  } else {
    d.textContent = '✕'; s.textContent = 'Cliquez une balise';
  }
}
document.getElementById('free-num').addEventListener('input', updateCurrentDisplay);

// ── NOMBRE DE BALISES ──
function setTotal(v) {
  let n = parseInt(v);
  if (isNaN(n) || n < 1) n = 1;
  if (n > 99) n = 99;
  totalBalises = n;
  document.getElementById('total-balises').value = n;
  recomputeNextSeq();
  if (decoyEnabled) assignMissingLabels();
  renderAll();
}

function recomputeNextSeq() {
  const placed = new Set(balises.map(b => b.num));
  let next = 1;
  while (next <= totalBalises && placed.has(next)) next++;
  nextSeq = next;
}

// ── CLICK ON MAP ──
function onMapClick(e) {
  if (mode === 'move' || mode === 'del') return;
  const mc = document.getElementById('map-container');
  const rect = mc.getBoundingClientRect();
  const xPct = (e.clientX - rect.left) / rect.width * 100;
  const yPct = (e.clientY - rect.top) / rect.height * 100;

  if (mode === 'depart') {
    depart = { x: xPct, y: yPct };
    renderAll();
    showToast('Départ placé');
    return;
  }

  let num;
  if (mode === 'seq') {
    if (nextSeq > totalBalises) { showToast(totalBalises + ' balises déjà placées !'); return; }
    num = nextSeq;
  } else {
    num = parseInt(document.getElementById('free-num').value);
    if (isNaN(num) || num < 1 || num > 99) { showToast('Numéro invalide'); return; }
  }

  // Conserver le côté/étiquette si on repositionne une balise existante
  const existing = balises.find(b => b.num === num);
  const side = existing ? existing.side : 'right';
  const label = existing ? existing.label : '';
  balises = balises.filter(b => b.num !== num);
  balises.push({ num, x: xPct, y: yPct, side, label });

  if (mode === 'seq') recomputeNextSeq();
  if (decoyEnabled) assignMissingLabels();

  renderAll();
}

// ── RENDER ──
function renderAll() {
  renderSVG();
  renderList();
  renderCorrespondence();
  updateCurrentDisplay();
  updateProgress();
}

function labelOf(b) {
  return (decoyEnabled && viewMode === 'eleve') ? (b.label || '?') : b.num;
}

function renderSVG() {
  const svg = document.getElementById('map-svg');
  // viewBox = dimensions réelles de l'image (en pixels). Le SVG (100% × 100%)
  // recouvre exactement l'image affichée et est mis à l'échelle de façon
  // UNIFORME : les ronds restent ronds et les balises restent verrouillées
  // sur la carte quel que soit le zoom ou l'impression.
  const W = imgNaturalW || 1000, H = imgNaturalH || 1000;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'none');

  svg.querySelectorAll('.balise-marker, .depart-marker').forEach(g => g.remove());

  const m = mode;
  const R = Math.min(W, H) * 0.012;   // rayon des ronds (proportionnel à la carte)
  const SW = R * 0.28;                // épaisseur de trait

  // ── DÉPART (triangle plein pointe en haut, convention IOF) ──
  if (depart) {
    const cx = depart.x / 100 * W, cy = depart.y / 100 * H;
    const s = R * 1.5;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'depart-marker');
    g.style.pointerEvents = (m === 'del' || m === 'move') ? 'all' : 'none';
    g.style.cursor = m === 'move' ? 'grab' : m === 'del' ? 'not-allowed' : 'default';

    const tri = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    tri.setAttribute('points', `${cx},${cy - s*1.4} ${cx - s},${cy + s*0.8} ${cx + s},${cy + s*0.8}`);
    tri.setAttribute('fill', '#E85D04');
    tri.setAttribute('stroke', '#E85D04');
    tri.setAttribute('stroke-width', SW);
    g.appendChild(tri);

    g.addEventListener('click', e => { e.stopPropagation(); if (mode === 'del') { depart = null; renderAll(); showToast('Départ supprimé'); } });
    g.addEventListener('mousedown', e => { if (mode !== 'move') return; e.stopPropagation(); dragging = { isDepart: true }; });
    svg.appendChild(g);
  }

  // ── BALISES (cercle + étiquette) ──
  balises.slice().sort((a,b) => a.num - b.num).forEach(b => {
    const cx = b.x / 100 * W, cy = b.y / 100 * H;
    const side = b.side === 'left' ? 'left' : 'right';

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'balise-marker');
    g.setAttribute('data-num', b.num);
    g.style.cursor = (m === 'del') ? 'not-allowed' : (m === 'move') ? 'grab' : 'default';
    g.style.pointerEvents = (m === 'del' || m === 'move') ? 'all' : 'none';

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('r', R);
    circle.setAttribute('fill', 'none');
    circle.setAttribute('stroke', '#E85D04');
    circle.setAttribute('stroke-width', SW);
    g.appendChild(circle);

    const fs = R * 1.7;
    const gap = R * 0.5;
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    if (side === 'left') {
      txt.setAttribute('x', cx - R - gap);
      txt.setAttribute('text-anchor', 'end');
    } else {
      txt.setAttribute('x', cx + R + gap);
      txt.setAttribute('text-anchor', 'start');
    }
    txt.setAttribute('y', cy);
    txt.setAttribute('font-family', "'DM Mono', monospace");
    txt.setAttribute('font-size', fs);
    txt.setAttribute('font-weight', '700');
    txt.setAttribute('dominant-baseline', 'central');
    txt.setAttribute('fill', '#E85D04');
    // Halo blanc pour rester lisible par-dessus les éléments de la carte
    txt.setAttribute('stroke', '#ffffff');
    txt.setAttribute('stroke-width', fs * 0.28);
    txt.setAttribute('stroke-linejoin', 'round');
    txt.setAttribute('paint-order', 'stroke');
    txt.textContent = labelOf(b);
    g.appendChild(txt);

    g.addEventListener('click', e => { e.stopPropagation(); if (mode === 'del') deleteBalise(b.num); });
    g.addEventListener('mousedown', e => { if (mode !== 'move') return; e.stopPropagation(); dragging = { num: b.num }; });
    // Clic droit = basculer l'étiquette à gauche/droite du rond
    g.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); toggleSide(b.num); });

    svg.appendChild(g);
  });
}

// ── CÔTÉ DE L'ÉTIQUETTE ──
function toggleSide(num) {
  const b = balises.find(b => b.num === num);
  if (!b) return;
  b.side = (b.side === 'left') ? 'right' : 'left';
  renderAll();
}

// ── DRAG ──
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const mc = document.getElementById('map-container');
  const rect = mc.getBoundingClientRect();
  const xPct = Math.max(0, Math.min(100, (e.clientX - rect.left) / rect.width * 100));
  const yPct = Math.max(0, Math.min(100, (e.clientY - rect.top) / rect.height * 100));
  if (dragging.isDepart) {
    depart = { x: xPct, y: yPct };
  } else {
    const b = balises.find(b => b.num === dragging.num);
    if (b) { b.x = xPct; b.y = yPct; }
  }
  renderSVG();
});
document.addEventListener('mouseup', () => { dragging = null; });

// ── LIST ──
function renderList() {
  const list = document.getElementById('balises-list');
  list.innerHTML = '';
  const placed = new Map(balises.map(b => [b.num, b]));

  for (let i = 1; i <= totalBalises; i++) {
    const b = placed.get(i);
    const isPlaced = !!b;
    list.appendChild(buildListItem(i, b, isPlaced));
  }

  // Balises supplémentaires (mode libre > nombre du parcours)
  balises.filter(b => b.num > totalBalises).sort((a,b) => a.num - b.num).forEach(b => {
    list.appendChild(buildListItem(b.num, b, true));
  });
}

function buildListItem(i, b, isPlaced) {
  const div = document.createElement('div');
  div.className = 'balise-item ' + (isPlaced ? 'placed' : 'unplaced');

  const dot = document.createElement('div');
  dot.className = 'balise-dot ' + (isPlaced ? 'placed' : 'unplaced');

  const num = document.createElement('span');
  num.className = 'balise-num';
  num.textContent = i;

  const lbl = document.createElement('span');
  lbl.style.fontSize = '11px';
  lbl.textContent = isPlaced ? (decoyEnabled && b.label ? '→ ' + b.label : 'placée') : '—';

  div.appendChild(dot);
  div.appendChild(num);
  div.appendChild(lbl);

  if (isPlaced) {
    const sideBtn = document.createElement('button');
    sideBtn.className = 'balise-side';
    sideBtn.textContent = b.side === 'left' ? '←#' : '#→';
    sideBtn.title = 'Numéro à gauche / à droite du rond';
    sideBtn.onclick = (e) => { e.stopPropagation(); toggleSide(i); };
    div.appendChild(sideBtn);

    const del = document.createElement('button');
    del.className = 'balise-del';
    del.textContent = '✕';
    del.title = 'Supprimer';
    del.onclick = (e) => { e.stopPropagation(); deleteBalise(i); };
    div.appendChild(del);

    div.onclick = () => highlightBalise(i);
  }
  return div;
}

function highlightBalise(num) {
  const g = document.querySelector(`.balise-marker[data-num="${num}"]`);
  if (!g) return;
  const circle = g.querySelector('circle');
  if (!circle) return;
  const orig = circle.getAttribute('stroke-width');
  circle.setAttribute('stroke', '#2ec4b6');
  circle.setAttribute('stroke-width', orig * 2.2);
  setTimeout(() => { circle.setAttribute('stroke', '#E85D04'); circle.setAttribute('stroke-width', orig); }, 500);
}

function deleteBalise(num) {
  balises = balises.filter(b => b.num !== num);
  if (mode === 'seq' && num < nextSeq) recomputeNextSeq();
  renderAll();
  showToast(`Balise ${num} supprimée`);
}

function updateProgress() {
  const n = balises.filter(b => b.num >= 1 && b.num <= totalBalises).length;
  const pct = totalBalises ? (n / totalBalises * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${n} / ${totalBalises} balises`;
}

// ── PLAN FAUSSES BALISES ──
function setDecoy(checked) {
  decoyEnabled = checked;
  document.getElementById('decoy-controls').style.display = checked ? 'block' : 'none';
  document.getElementById('btn-print-eleve').style.display = checked ? 'flex' : 'none';
  if (checked) {
    if (balises.some(b => !b.label)) regenerateLabels();
    else renderAll();
  } else {
    viewMode = 'prof';
    setViewButtons();
    renderAll();
  }
}

function setDecoyType(t) {
  decoyType = t;
  regenerateLabels();
}

function setView(v) {
  viewMode = v;
  setViewButtons();
  renderSVG();
}
function setViewButtons() {
  document.getElementById('view-prof').classList.toggle('active', viewMode === 'prof');
  document.getElementById('view-eleve').classList.toggle('active', viewMode === 'eleve');
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function toLetters(i) {
  let s = '';
  i++;
  while (i > 0) { i--; s = String.fromCharCode(65 + (i % 26)) + s; i = Math.floor(i / 26); }
  return s;
}

// Régénère TOUTES les étiquettes élève (écrase les saisies manuelles)
function regenerateLabels() {
  const sorted = balises.slice().sort((a,b) => a.num - b.num);
  if (decoyType === 'letters') {
    sorted.forEach((b, i) => b.label = toLetters(i));
  } else {
    const nums = sorted.map(b => b.num);
    let perm = nums.slice();
    for (let t = 0; t < 60; t++) {
      perm = shuffle(nums.slice());
      // déranger : éviter qu'une fausse balise = son vrai numéro
      if (nums.length < 2 || perm.every((v, i) => v !== nums[i])) break;
    }
    sorted.forEach((b, i) => b.label = String(perm[i]));
  }
  renderAll();
}

// Attribue une étiquette UNIQUEMENT aux balises qui n'en ont pas (préserve les saisies)
function assignMissingLabels() {
  const used = new Set(balises.map(b => b.label).filter(Boolean));
  const sorted = balises.slice().sort((a,b) => a.num - b.num);
  if (decoyType === 'letters') {
    let i = 0;
    sorted.forEach(b => {
      if (!b.label) { let L; do { L = toLetters(i++); } while (used.has(L)); b.label = L; used.add(L); }
    });
  } else {
    sorted.forEach(b => {
      if (!b.label) { let n = 1; while (used.has(String(n)) || n === b.num) n++; b.label = String(n); used.add(String(n)); }
    });
  }
}

function editLabel(num, val) {
  const b = balises.find(x => x.num === num);
  if (b) { b.label = val.trim(); renderSVG(); }
}

function renderCorrespondence() {
  const wrap = document.getElementById('corr-wrap');
  if (!wrap) return;
  if (!decoyEnabled || balises.length === 0) { wrap.innerHTML = ''; return; }
  const sorted = balises.slice().sort((a,b) => a.num - b.num);
  let html = '<table class="corr-table"><thead><tr><th>Balise réelle</th><th>Étiquette élève</th></tr></thead><tbody>';
  sorted.forEach(b => {
    const safe = String(b.label || '').replace(/"/g, '&quot;');
    html += `<tr><td>${b.num}</td><td><input class="balise-label-input" value="${safe}" oninput="editLabel(${b.num}, this.value)"></td></tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function buildPrintCorr() {
  const el = document.getElementById('print-corr');
  const sorted = balises.slice().sort((a,b) => a.num - b.num);
  let html = '<h2>Tableau de correspondance — Plan fausses balises</h2>';
  html += '<table><thead><tr><th>Balise réelle (terrain)</th><th>Étiquette élève (plan)</th></tr></thead><tbody>';
  sorted.forEach(b => { html += `<tr><td>${b.num}</td><td>${b.label || ''}</td></tr>`; });
  html += '</tbody></table>';
  el.innerHTML = html;
}

// ── ZOOM ──
function zoom(delta) {
  scale = Math.max(0.2, Math.min(3, scale + delta));
  applyScale();
}
function resetZoom() { scale = 1; applyScale(); }
function applyScale() {
  const img = document.getElementById('map-img');
  img.style.width = (imgNaturalW * scale) + 'px';
  setTimeout(renderSVG, 50);
}

// ── SAVE / LOAD ──
function saveData() {
  if (balises.length === 0 && !depart) { showToast('Aucune balise à sauvegarder'); return; }
  const data = JSON.stringify({ balises, nextSeq, depart, totalBalises, decoyEnabled, decoyType }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'carte_co_balises.json';
  a.click();
  showToast('Sauvegarde téléchargée !');
}
function loadFile() { document.getElementById('load-input').click(); }
function loadData(input) {
  const f = input.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      balises = (data.balises || []).map(b => ({
        num: b.num, x: b.x, y: b.y,
        side: b.side === 'left' ? 'left' : 'right',
        label: b.label || ''
      }));
      depart = data.depart || null;
      totalBalises = data.totalBalises || 24;
      decoyEnabled = !!data.decoyEnabled;
      decoyType = data.decoyType === 'numbers' ? 'numbers' : 'letters';

      // Synchroniser l'interface
      document.getElementById('total-balises').value = totalBalises;
      document.getElementById('decoy-toggle').checked = decoyEnabled;
      document.getElementById('decoy-type').value = decoyType;
      document.getElementById('decoy-controls').style.display = decoyEnabled ? 'block' : 'none';
      document.getElementById('btn-print-eleve').style.display = decoyEnabled ? 'flex' : 'none';
      viewMode = 'prof';
      setViewButtons();
      recomputeNextSeq();
      renderAll();
      showToast(`${balises.length} balises chargées`);
    } catch { showToast('Fichier invalide'); }
  };
  reader.readAsText(f);
  input.value = '';
}

// ── CLEAR ──
function clearAll() {
  if (!confirm('Effacer toutes les balises et le départ ?')) return;
  balises = [];
  depart = null;
  recomputeNextSeq();
  renderAll();
  showToast('Carte réinitialisée');
}

// ── PRINT ──
function printAs(target) {
  if (!document.getElementById('map-img').src || !imgNaturalW) { showToast('Aucune carte chargée'); return; }
  savedViewMode = viewMode;
  const printProfTable = decoyEnabled && target === 'prof';
  document.body.setAttribute('data-print', printProfTable ? 'prof' : target);
  viewMode = (decoyEnabled && target === 'eleve') ? 'eleve' : 'prof';
  setViewButtons();
  if (printProfTable) buildPrintCorr(); else document.getElementById('print-corr').innerHTML = '';
  renderSVG();
  window.print();
}

window.addEventListener('beforeprint', renderSVG);

window.addEventListener('afterprint', () => {
  document.body.removeAttribute('data-print');
  viewMode = savedViewMode;
  setViewButtons();
  renderSVG();
});

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── RESIZE ──
window.addEventListener('resize', () => { if (imgNaturalW) renderSVG(); });

// Init
document.getElementById('total-balises').value = totalBalises;
renderList();
updateProgress();
updateCurrentDisplay();

// Auto-load embedded image
window.addEventListener('load', () => {
  const img = document.getElementById('map-img');
  imgNaturalW = img.naturalWidth;
  imgNaturalH = img.naturalHeight;
  if (!imgNaturalW) {
    img.onload = () => {
      imgNaturalW = img.naturalWidth;
      imgNaturalH = img.naturalHeight;
      scale = Math.min(1, (window.innerWidth - 280) / imgNaturalW);
      applyScale();
    };
  } else {
    scale = Math.min(1, (window.innerWidth - 280) / imgNaturalW);
    applyScale();
  }
});
</script>
</body>
</html>
